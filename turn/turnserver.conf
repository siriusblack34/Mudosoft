# MudoSoft TURN Server Configuration
# Coturn settings for WebRTC NAT traversal

# Server listening settings
listening-port=3478
tls-listening-port=5349

# External IP Configuration
# ==========================
# LOCAL DEVELOPMENT: Use your local IP (run: ipconfig to find it)
# external-ip=YOUR_LOCAL_IP
# 
# PRODUCTION: Use the backend server IP
# CURRENT SETTING:
external-ip=10.0.213.89
listening-ip=0.0.0.0

# Relay IP range
min-port=49152
max-port=65535

# Authentication
realm=mudosoft.local
server-name=mudosoft.local

# User credentials (username:password)
user=mudosoft:Mudo2024Turn!

# Logging
log-file=/var/log/turnserver.log
verbose

# Security
fingerprint
lt-cred-mech
no-cli

# Allow connections from any IP
total-quota=100
stale-nonce=600
no-stun
